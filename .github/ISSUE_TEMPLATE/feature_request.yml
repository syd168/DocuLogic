name: Feature Request
description: 为这个项目提出一个想法
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        感谢你提出功能建议！请尽可能详细地描述你的想法。
        
  - type: textarea
    id: problem
    attributes:
      label: 相关问题
      description: 这个功能请求是否与某个问题相关？请描述
      placeholder: 我经常遇到这样的问题...
    validations:
      required: true
      
  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望发生什么
      placeholder: 我希望能够...
    validations:
      required: true
      
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过的替代解决方案或功能
      placeholder: 或者可以...
      
  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      description: 这个功能对你的重要程度
      options:
        - 低（有更好）
        - 中（需要）
        - 高（必需）
    validations:
      required: true
      
  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      description: 这个功能主要影响哪个部分
      multiple: true
      options:
        - 前端界面
        - 后端 API
        - 模型推理
        - 用户管理
        - 系统配置
        - 文档
        - 其他
        
  - type: textarea
    id: examples
    attributes:
      label: 示例或 mockup
      description: 如果可能，提供示例、mockup 或参考链接
      
  - type: textarea
    id: additional
    attributes:
      label: 附加信息
      description: 添加任何其他上下文或截图
